openapi: 3.1.0

info:
  title: Smart Campus — Core to Analytics Mock Contract
  version: 1.0.0
  description: |
    OpenAPI tối giản cho Lab 02 pair-08-core-analytics-async.

    Provider: Core Business
    Consumer: Analytics
    Communication: Queue async

    Lưu ý: Trong hệ thống thật, Core Business gửi event sang Analytics qua queue.
    File OpenAPI này chỉ dùng để mock/test contract bằng Prism theo yêu cầu Lab 02.

servers:
  - url: http://localhost:4010
    description: Prism mock server

tags:
  - name: health
    description: Kiểm tra mock server
  - name: events
    description: Mock endpoint nhận event từ Core Business
  - name: analytics
    description: Mock endpoint trả dữ liệu tổng hợp

security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra mock server
      description: Kiểm tra Prism mock server có đang hoạt động hay không.
      tags:
        - health
      security: []
      responses:
        "200":
          description: Mock server đang hoạt động
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /events/core:
    post:
      operationId: ingestCoreEvent
      summary: Nhận event từ Core Business
      description: |
        Endpoint mô phỏng việc Analytics nhận event từ Core Business.
        Trong hệ thống thật, luồng này sẽ đi qua queue async.
      tags:
        - events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoreEvent"
            examples:
              policyDecision:
                value:
                  eventId: EVT-001
                  eventType: policy.decision.created
                  eventVersion: 1.0.0
                  occurredAt: "2026-05-19T10:00:00Z"
                  source: core-business
                  correlationId: CORR-001
                  data:
                    decisionId: DEC-001
                    ruleCode: ACCESS_AFTER_HOURS
                    decision: deny
                    targetType: access_event
                    targetId: ACC-001
                    severity: high
                    reason: Access outside allowed time
              alertCreated:
                value:
                  eventId: EVT-002
                  eventType: alert.created
                  eventVersion: 1.0.0
                  occurredAt: "2026-05-19T10:05:00Z"
                  source: core-business
                  correlationId: CORR-002
                  data:
                    alertId: ALT-001
                    alertType: unauthorized_access
                    severity: high
                    status: open
                    message: Unauthorized access detected
              alertResolved:
                value:
                  eventId: EVT-003
                  eventType: alert.resolved
                  eventVersion: 1.0.0
                  occurredAt: "2026-05-19T10:30:00Z"
                  source: core-business
                  correlationId: CORR-003
                  data:
                    alertId: ALT-001
                    resolvedAt: "2026-05-19T10:30:00Z"
                    resolutionStatus: resolved
                    resolutionNote: Security team handled the alert
      responses:
        "202":
          description: Event đã được nhận để xử lý
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /events/core/{eventId}:
    get:
      operationId: getCoreEventById
      summary: Tra cứu event theo mã event
      description: Endpoint mock dùng để kiểm tra Analytics đã nhận event hay chưa.
      tags:
        - events
      parameters:
        - name: eventId
          in: path
          required: true
          description: Mã event cần tra cứu
          schema:
            type: string
            minLength: 1
            maxLength: 80
      responses:
        "200":
          description: Tìm thấy event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoreEvent"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /analytics/core/summary:
    get:
      operationId: getCoreAnalyticsSummary
      summary: Lấy thống kê tổng hợp từ event Core
      description: |
        Endpoint mock trả về thống kê tổng hợp dựa trên event Core Business.
        Dùng để chứng minh Analytics có thể tạo metric cho dashboard.
      tags:
        - analytics
      parameters:
        - name: from
          in: query
          required: true
          description: Thời gian bắt đầu
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          description: Thời gian kết thúc
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Thống kê tổng hợp
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoreAnalyticsSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          example: analytics-mock-contract

    CoreEvent:
      oneOf:
        - $ref: "#/components/schemas/PolicyDecisionCreatedEvent"
        - $ref: "#/components/schemas/AlertCreatedEvent"
        - $ref: "#/components/schemas/AlertResolvedEvent"
      discriminator:
        propertyName: eventType
        mapping:
          policy.decision.created: "#/components/schemas/PolicyDecisionCreatedEvent"
          alert.created: "#/components/schemas/AlertCreatedEvent"
          alert.resolved: "#/components/schemas/AlertResolvedEvent"

    EventBase:
      type: object
      additionalProperties: false
      required:
        - eventId
        - eventType
        - eventVersion
        - occurredAt
        - source
        - correlationId
        - data
      properties:
        eventId:
          type: string
          minLength: 1
          maxLength: 80
        eventType:
          type: string
        eventVersion:
          type: string
          example: 1.0.0
        occurredAt:
          type: string
          format: date-time
        source:
          type: string
          enum:
            - core-business
        correlationId:
          type: string
          minLength: 1
          maxLength: 80
        data:
          type: object

    PolicyDecisionCreatedEvent:
      allOf:
        - $ref: "#/components/schemas/EventBase"
        - type: object
          required:
            - eventType
            - data
          properties:
            eventType:
              type: string
              const: policy.decision.created
            data:
              $ref: "#/components/schemas/PolicyDecisionData"

    AlertCreatedEvent:
      allOf:
        - $ref: "#/components/schemas/EventBase"
        - type: object
          required:
            - eventType
            - data
          properties:
            eventType:
              type: string
              const: alert.created
            data:
              $ref: "#/components/schemas/AlertCreatedData"

    AlertResolvedEvent:
      allOf:
        - $ref: "#/components/schemas/EventBase"
        - type: object
          required:
            - eventType
            - data
          properties:
            eventType:
              type: string
              const: alert.resolved
            data:
              $ref: "#/components/schemas/AlertResolvedData"

    PolicyDecisionData:
      type: object
      additionalProperties: false
      required:
        - decisionId
        - ruleCode
        - decision
        - targetType
        - targetId
      properties:
        decisionId:
          type: string
        ruleCode:
          type: string
        decision:
          type: string
          enum:
            - allow
            - deny
            - review
        targetType:
          type: string
        targetId:
          type: string
        severity:
          $ref: "#/components/schemas/Severity"
        reason:
          type:
            - string
            - "null"

    AlertCreatedData:
      type: object
      additionalProperties: false
      required:
        - alertId
        - alertType
        - severity
        - status
        - message
      properties:
        alertId:
          type: string
        alertType:
          type: string
          example: unauthorized_access
        severity:
          $ref: "#/components/schemas/Severity"
        status:
          type: string
          enum:
            - open
            - in_progress
            - resolved
        message:
          type: string

    AlertResolvedData:
      type: object
      additionalProperties: false
      required:
        - alertId
        - resolvedAt
        - resolutionStatus
      properties:
        alertId:
          type: string
        resolvedAt:
          type: string
          format: date-time
        resolutionStatus:
          type: string
          enum:
            - resolved
            - dismissed
            - false_positive
        resolutionNote:
          type:
            - string
            - "null"

    Severity:
      type: string
      enum:
        - low
        - medium
        - high
        - critical

    EventAcceptedResponse:
      type: object
      additionalProperties: false
      required:
        - accepted
        - eventId
        - status
      properties:
        accepted:
          type: boolean
        eventId:
          type: string
        status:
          type: string
          enum:
            - accepted

    CoreAnalyticsSummary:
      type: object
      additionalProperties: false
      required:
        - from
        - to
        - totalPolicyDecisions
        - totalAlerts
        - resolvedAlerts
      properties:
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        totalPolicyDecisions:
          type: integer
          minimum: 0
        totalAlerts:
          type: integer
          minimum: 0
        resolvedAlerts:
          type: integer
          minimum: 0
        averageResolutionMinutes:
          type:
            - number
            - "null"
          minimum: 0

    Problem:
      type: object
      additionalProperties: true
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type:
            - string
            - "null"
        instance:
          type:
            - string
            - "null"

  responses:
    BadRequest:
      description: Request không hợp lệ
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

    Unauthorized:
      description: Thiếu hoặc sai Bearer token
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

    UnprocessableEntity:
      description: JSON đúng cú pháp nhưng sai nghiệp vụ/schema
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

    NotFound:
      description: Không tìm thấy resource
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

    InternalServerError:
      description: Lỗi nội bộ server
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"